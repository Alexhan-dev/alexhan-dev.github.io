<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        /* 基础样式，方便测试 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #333;
            margin: 20px 0;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            border: none;
            border-radius: 4px;
            background: #409eff;
            color: white;
            cursor: pointer;
        }
        button.danger {
            background: #f56c6c;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        img {
            max-width: 100%;
            margin: 15px 0;
            border-radius: 4px;
        }
        ul, ol {
            margin: 15px 30px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>测试用 HTML 页面</h1>
        <p>这是一个用于测试的完整 HTML 文件，包含常用页面元素</p>

        <h2>1. 按钮测试</h2>
        <button onclick="alert('普通按钮点击')">普通按钮</button>
        <button class="danger" onclick="alert('危险按钮点击')">危险按钮</button>

        <h2>2. 表单测试</h2>
        <form>
            <input type="text" placeholder="输入框测试">
            <input type="password" placeholder="密码框测试">
            <textarea rows="3" placeholder="多行文本框"></textarea>
            <button type="submit">提交表单</button>
        </form>

        <h2>3. 图片测试</h2>
        <!-- 在线测试图片，无需本地文件 -->
        <img src="https://picsum.photos/600/300" alt="测试图片">

        <h2>4. 列表测试</h2>
        <ul>
            <li>无序列表项 1</li>
            <li>无序列表项 2</li>
            <li>无序列表项 3</li>
        </ul>
        <ol>
            <li>有序列表项 1</li>
            <li>有序列表项 2</li>
        </ol>
    </div>

    <script>
        // 测试脚本
        console.log("HTML 测试页面加载成功！");
    </script>
</body>
</html>
